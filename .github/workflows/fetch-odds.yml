name: Fetch World Cup Odds

on:
  schedule:
    # 6x per day aligned to World Cup kickoff windows (CT = UTC-5)
    - cron: '0 13 * * *'   #  8:00 AM CT — before morning games
    - cron: '0 16 * * *'   # 11:00 AM CT — before noon games
    - cron: '30 18 * * *'  #  1:30 PM CT — before 2PM/3PM games
    - cron: '30 21 * * *'  #  4:30 PM CT — before 5PM/6:30PM games
    - cron: '30 0 * * *'   #  7:30 PM CT — before 8PM/9PM games
    - cron: '30 3 * * *'   # 10:30 PM CT — before 10PM/11PM games
  workflow_dispatch:

jobs:
  fetch-odds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin node-fetch

      - name: Fetch odds and write to Firebase
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node fetch-odds.js
