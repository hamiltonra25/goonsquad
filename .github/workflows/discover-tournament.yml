name: Discover Tournament ID

on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Discover World Cup tournament ID
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
        run: node discover-tournament.js
