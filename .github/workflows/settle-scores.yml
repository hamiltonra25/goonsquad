name: Auto-Settle Scores

on:
 schedule:
   # Run at specific times CT (CDT = UTC-5) — GitHub cron is in UTC
   # These align with end of typical match windows: 6PM, 9PM, 11PM, 2AM, 5AM CT
   - cron: '0 23 * * *'   # 6:00 PM CT
   - cron: '0 2 * * *'    # 9:00 PM CT
   - cron: '0 4 * * *'    # 11:00 PM CT
   - cron: '0 7 * * *'    # 2:00 AM CT
   - cron: '0 10 * * *'   # 5:00 AM CT
   - cron: '30 15 * * *'  # 10:30 AM CT (catch morning games)
   - cron: '30 18 * * *'  # 1:30 PM CT (catch afternoon games)
   - cron: '30 21 * * *'  # 4:30 PM CT (catch early evening games)
 workflow_dispatch: # allow manual trigger

jobs:
 settle:
   runs-on: ubuntu-latest
   steps:
     - name: Checkout repo
       uses: actions/checkout@v4

     - name: Setup Node.js
       uses: actions/setup-node@v4
       with:
         node-version: '20'

     - name: Install dependencies
       run: npm install firebase-admin node-fetch

     - name: Fetch scores and settle bets
       env:
         FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
         FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
         FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
         FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
       run: node settle-scores.js
