name: Auto-Settle Scores

on:
  schedule:
    # Every 5 minutes during peak game hours (11AM-midnight CT = 4PM-5AM UTC)
    - cron: '*/5 16-23 * * *'   # 11AM-6PM CT every 5 min
    - cron: '*/5 0-5 * * *'     # 7PM-midnight CT every 5 min
    # Every 30 minutes overnight (midnight-11AM CT = 5AM-4PM UTC)
    - cron: '*/30 6-15 * * *'   # midnight-10AM CT every 30 min
  workflow_dispatch:

jobs:
  settle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin node-fetch

      - name: Fetch scores and settle bets
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: node settle-scores.js
