<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .settle-row { display: flex; gap: 7px; align-items: center; }

  .settle-delete { background: #fff; color: #aaa; border: 1px solid #ddd !important; margin-left: auto; }

  /* ── Leaderboard ── */
  .lb-row { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 11px 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .lb-rank { font-size: 18px; font-weight: 600; color: #ccc; min-width: 26px; }
  .lb-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; flex-shrink: 0; }
  .lb-name { font-weight: 500; font-size: 15px; }
  .lb-sub { font-size: 11px; color: #888; margin-top: 1px; }
  .lb-right { text-align: right; margin-left: auto; }
  .lb-balance { font-size: 17px; font-weight: 600; }
  .lb-change { font-size: 11px; margin-top: 1px; }
  .lb-change.up { color: #3B6D11; }
  .lb-change.down { color: #A32D2D; }
  .lb-change.flat { color: #888; }
  .payout-note { margin-top: 14px; background: #ebebeb; border-radius: 8px; padding: 11px 14px; font-size: 12px; color: #777; }
  .payout-note strong { color: #1a1a1a; }

  /* ── Commissioner tab ── */
  .comm-match { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 13px 15px; margin-bottom: 10px; }
  .comm-match.settled { opacity: 0.6; }
  .comm-match-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .comm-match-meta  { font-size: 11px; color: #999; margin-bottom: 10px; }
  .comm-score-row   { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .comm-score-row label { font-size: 12px; color: #555; white-space: nowrap; }
  .comm-score-input { width: 52px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 7px; font-size: 16px; font-weight: 600; text-align: center; }
  .comm-dash { font-size: 18px; color: #ccc; font-weight: 300; }
  .comm-submit { background: #185FA5; color: #fff; border: none; border-radius: 8px; padding: 7px 16px; cursor: pointer; font-size: 13px; font-weight: 600; white-space: nowrap; }
  .comm-submit:disabled { background: #aaa; cursor: default; }
  .comm-result-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .comm-settled-score { font-size: 13px; font-weight: 600; color: #3B6D11; }
  .comm-preview { font-size: 11px; color: #888; margin-top: 8px; line-height: 1.7; }
  .comm-preview strong { color: #1a1a1a; }

  /* ── Pending bets under match row ── */
  .match-pending-bets { display: flex; flex-wrap: wrap; gap: 5px; padding: 4px 9px 7px; margin-top: -3px; }
  .pending-bet-tag { font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; display: none; z-index: 999; white-space: nowrap; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
  #toast.success { background: #EAF3DE; color: #3B6D11; }
  #toast.error   { background: #FCEBEB; color: #A32D2D; }
  #toast.info    { background: #EEEDFE; color: #534AB7; }

  /* ── Loading ── */
  #loading { display: flex; align-items: center; justify-content: center; min-height: 80vh; font-size: 14px; color: #888; }

  /* ── Config screen ── */
  #config-screen { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 20px; margin-top: 20px; }
  #config-screen h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
  #config-screen label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  #config-screen input { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 7px; font-size: 13px; margin-bottom: 10px; }
  #config-screen .save-btn { background: #185FA5; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; cursor: pointer; font-weight: 600; font-size: 13px; }
  #config-screen p { font-size: 12px; color: #888; margin-bottom: 12px; line-height: 1.5; }
  #config-screen a { color: #185FA5; }
  #config-screen .field-row { display: flex; gap: 8px; }

</style>

<body>
<div id="app">
  <div id="loading">Loading…</div>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, addDoc, updateDoc, deleteDoc, serverTimestamp, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ─────────────────────────────────────────────
// FIREBASE CONFIG — fill in your own values below
// ─────────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDpnbCag54EDtOrwkocmIummeZJ9vpr00k",
  authDomain:        "goonsquad-futbol.firebaseapp.com",
  projectId:         "goonsquad-futbol",
  storageBucket:     "goonsquad-futbol.firebasestorage.app",
  messagingSenderId: "518391194891",
  appId:             "1:518391194891:web:d16cead641b9e3c1a0ae0e",
};
// ─────────────────────────────────────────────

const INITIAL_SHARES = 3500;
const PLAYERS = ["R3", "Une", "AK", "Brez"];
const PLAYER_COLORS = ["#185FA5", "#3B6D11", "#993C1D", "#534AB7"];
const PLAYER_BG     = ["#E6F1FB", "#EAF3DE", "#FAECE7", "#EEEDFE"];
const PLAYER_INITIALS = ["R3", "UN", "AK", "BR"];

// MATCHES is populated from Firebase (written by GitHub Actions fetch-odds.js)
let MATCHES = [];

const BET_TYPES = ["Moneyline","Tie No Bet","Total Goals","Spread","Double Chance"];

function fmt(o) { return o > 0 ? `+${o}` : `${o}`; }
function calcPayout(w, o) { return o > 0 ? Math.round(w*(o/100)) : Math.round(w*(100/Math.abs(o))); }
function isLocked(m, now) { return now >= m.kickoffUTC; }
function countdown(m, now) {
  const diff = m.kickoffUTC - now; if (diff<=0) return null;
  const mins=Math.floor(diff/60000), h=Math.floor(mins/60), mo=mins%60;
  if(h>48){const d=Math.floor(h/24);return `${d}d ${h%24}h`;}
  return h>0 ? `${h}h ${mo}m` : `${mo}m`;
}
function getOdds(m, bt) {
  if(bt==="Moneyline") return [{key:"home_win",label:m.home,odds:m.moneyline.home},{key:"draw",label:"Draw",odds:m.moneyline.draw},{key:"away_win",label:m.away,odds:m.moneyline.away}];
  if(bt==="Tie No Bet") return [{key:"tnb_home",label:m.home,odds:m.tnb.home},{key:"tnb_away",label:m.away,odds:m.tnb.away}];
  if(bt==="Total Goals") return [{key:"over",label:`O ${m.total.line}`,odds:m.total.over},{key:"under",label:`U ${m.total.line}`,odds:m.total.under}];
  if(bt==="Spread") {
    const hl = m.spread.line;                          // home team line (e.g. -1.5 means home favored)
    const al = m.spread.awayLine !== undefined ? m.spread.awayLine : -hl; // away line is opposite
    const hlStr = hl > 0 ? "+" + hl : "" + hl;
    const alStr = al > 0 ? "+" + al : "" + al;
    return [
      {key:"spread_home", label:`${m.home} ${hlStr}`, odds:m.spread.homeFav},
      {key:"spread_away", label:`${m.away} ${alStr}`, odds:m.spread.awayDog},
    ];
  }
  if(bt==="Double Chance") return [{key:"dc_1x",label:`${m.home}/Draw`,odds:m.dc.homeOrDraw},{key:"dc_x2",label:`${m.away}/Draw`,odds:m.dc.awayOrDraw},{key:"dc_12",label:`${m.home}/${m.away}`,odds:m.dc.homeOrAway}];
  return [];
}
function formatCT(ts) {
  return new Date(ts).toLocaleTimeString("en-US",{timeZone:"America/Chicago",hour:"numeric",minute:"2-digit",hour12:true})+" CT";
}

// ── State ──
let db, currentPlayer = null, balances = {}, bets = [], betType = "Moneyline", scores = {}, oddsLastUpdated = null, oddsLoaded = false;
let selected = null, wagerVal = "", wagerError = "", activeTab = "wager", now = Date.now();
let unsubBets = null, unsubBalances = null;
let configMode = false;
let pinEntry = "";   // which player is entering their PIN
let pinError  = "";  // wrong PIN message

// 4-digit PINs — change these before sharing the file
const PINS = {
  "R3":   "4751",
  "Une":  "8392",
  "AK":   "6047",
  "Brez": "2815",
};

// ── Toast ──
let toastTimer;
function toast(msg, type="success") {
  const el = document.getElementById("toast");
  el.textContent = msg; el.className = type; el.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display="none"; }, 3000);
}

// ── Detect if Firebase is configured ──
function isConfigured() {
  return !FIREBASE_CONFIG.apiKey.startsWith("REPLACE");
}

// ── Firebase init ──
function initFirebase() {
  const fbApp = initializeApp(FIREBASE_CONFIG);
  db = getFirestore(fbApp);
}

// ── Subscribe to real-time data ──
function subscribe() {
  if (unsubBets) unsubBets();
  if (unsubBalances) unsubBalances();

  // Balances — one doc per player
  PLAYERS.forEach(p => {
    onSnapshot(doc(db, "balances", p), snap => {
      if (snap.exists()) { balances[p] = snap.data().amount; }
      else { balances[p] = INITIAL_SHARES; }
      render();
    });
  });

  // Live odds from Firebase (written by GitHub Actions every 6h)
  onSnapshot(doc(db, "config", "odds"), snap => {
    if (snap.exists()) {
      const data = snap.data();
      if (data.matches && Array.isArray(data.matches)) {
        MATCHES = data.matches.sort((a, b) => a.kickoffUTC - b.kickoffUTC);
        oddsLastUpdated = data.fetchedAt || null;
      }
    }
    render();
  });

  // Live matches from Firebase (written by GitHub Action)
  onSnapshot(collection(db, "matches"), snap => {
    if (snap.empty) return;
    MATCHES = snap.docs.map(d => d.data()).sort((a,b) => a.kickoffUTC - b.kickoffUTC);
    oddsLoaded = true;
    render();
  });

  // Odds metadata (last updated time)
  onSnapshot(doc(db, "meta", "odds"), snap => {
    if (snap.exists()) {
      oddsLastUpdated = snap.data().lastUpdated;
      render();
    }
  });

  // Scores (commissioner entries)
  onSnapshot(collection(db, "scores"), snap => {
    snap.docs.forEach(d => { scores[d.id] = d.data(); });
    render();
  });

  // All bets
  unsubBets = onSnapshot(collection(db, "bets"), snap => {
    bets = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      .sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));
    render();
  });
}

async function ensureBalance(player) {
  const ref = doc(db, "balances", player);
  const snap = await getDoc(ref);
  if (!snap.exists()) await setDoc(ref, { amount: INITIAL_SHARES });
}

async function placeBet() {
  if (!selected) { wagerError = "Select an outcome first."; render(); return; }
  const match = MATCHES.find(m => m.id === selected.matchId);
  if (isLocked(match, now)) { wagerError = "Betting is locked — match has started."; render(); return; }
  const amount = parseInt(wagerVal, 10);
  if (!amount || amount < 10) { wagerError = "Minimum wager is 10 shares."; render(); return; }
  const bal = balances[currentPlayer] ?? INITIAL_SHARES;
  if (amount > bal) { wagerError = "Not enough shares."; render(); return; }
  const opt = getOdds(match, betType).find(o => o.key === selected.optionKey);
  const toWin = calcPayout(amount, opt.odds);

  // Debit balance
  await setDoc(doc(db, "balances", currentPlayer), { amount: bal - amount });

  // Write bet
  await addDoc(collection(db, "bets"), {
    player: currentPlayer, matchId: match.id,
    matchLabel: `${match.home} vs ${match.away}`,
    ctLabel: match.ctLabel, betType,
    optionKey: selected.optionKey, optionLabel: opt.label,
    odds: opt.odds, wager: amount, toWin, status: "pending",
    createdAt: serverTimestamp(),
  });

  toast(`${currentPlayer} wagered ${amount.toLocaleString()} on ${opt.label}`);
  selected = null; wagerVal = ""; wagerError = "";
}

async function settleBet(betId, result) {
  const bet = bets.find(b => b.id === betId);
  if (!bet) return;
  await updateDoc(doc(db, "bets", betId), { status: result });
  const bal = balances[bet.player] ?? INITIAL_SHARES;
  if (result === "won")  await setDoc(doc(db, "balances", bet.player), { amount: bal + bet.wager + bet.toWin });
  if (result === "push") await setDoc(doc(db, "balances", bet.player), { amount: bal + bet.wager });
  toast(result==="won" ? "Settled as won!" : result==="push" ? "Push — wager returned." : "Settled as lost.",
        result==="won" ? "success" : result==="push" ? "info" : "error");
}

// ── Clock tick ──
setInterval(() => {
  now = Date.now();
  // auto-clear selection if match locked
  if (selected) {
    const m = MATCHES.find(m => m.id === selected.matchId);
    if (m && isLocked(m, now)) { selected = null; wagerVal = ""; }
  }
  render();
}, 15000);

// ── Render ──
function render() {
  const app = document.getElementById("app");
  if (!isConfigured()) { renderConfig(app); return; }
  if (!currentPlayer)  { renderLogin(app); return; }
  renderMain(app);
}

function renderOddsLoading(app) {
  app.innerHTML = `<div style="text-align:center;padding:3rem 1rem;color:#888;font-size:14px;">
    <div style="font-size:24px;margin-bottom:12px;">⚽</div>
    Loading live odds...<br>
    <span style="font-size:12px;color:#bbb;">Odds update automatically 4x per day</span>
  </div>`;
}

function renderConfig(app) {
  app.innerHTML = `
    <div id="config-screen">
      <h2>Firebase Setup Required</h2>
      <p>To make this work across devices, you need a free Firebase project. Here's how:</p>
      <p>
        1. Go to <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a><br>
        2. Click "Add project" → name it (e.g. <em>wc2026bets</em>) → disable Analytics → Create<br>
        3. Click the web icon (&lt;/&gt;) → register app → copy the <code>firebaseConfig</code> values<br>
        4. In the left sidebar go to <strong>Firestore Database</strong> → Create database → Start in test mode<br>
        5. Open this HTML file in a text editor and paste your values into the <code>FIREBASE_CONFIG</code> block at the top of the script<br>

}

function renderLogin(app) {
  if (pinEntry) {
    // PIN entry screen for selected player
    const pi = PLAYERS.indexOf(pinEntry);
    app.innerHTML = `
      <div id="login-screen">
        <h1>WC2026 Fantasy Gambling</h1>
        <p style="font-size:14px;font-weight:500;color:${PLAYER_COLORS[pi]}">${pinEntry}</p>
        <p>Enter your 4-digit PIN</p>
        <input id="pin-input" type="password" inputmode="numeric" maxlength="4"
          placeholder="••••"
          style="width:120px;text-align:center;font-size:22px;letter-spacing:6px;padding:10px;border:1.5px solid ${PLAYER_COLORS[pi]};border-radius:10px;outline:none;" />
        ${pinError ? `<p style="color:#A32D2D;font-size:13px;">${pinError}</p>` : "<p style='height:18px'></p>"}
        <button id="pin-submit" style="width:120px;padding:10px 0;border-radius:10px;border:1.5px solid ${PLAYER_COLORS[pi]};background:#fff;font-size:15px;font-weight:500;cursor:pointer;color:${PLAYER_COLORS[pi]};">Enter</button>
        <button id="pin-back" style="background:none;border:none;color:#aaa;font-size:12px;cursor:pointer;margin-top:4px;">← Back</button>
      </div>`;

    const pinInput = document.getElementById("pin-input");
    pinInput.focus();

    function tryPin() {
      const entered = pinInput.value;
      if (entered === PINS[pinEntry]) {
        pinError = "";
        currentPlayer = pinEntry;
        pinEntry = "";
        ensureBalance(currentPlayer).then(() => { subscribe(); render(); });
      } else {
        pinError = "Wrong PIN — try again.";
        pinInput.value = "";
        render();
      }
    }

    pinInput.addEventListener("keydown", e => { if (e.key === "Enter") tryPin(); });
    document.getElementById("pin-submit").addEventListener("click", tryPin);
    document.getElementById("pin-back").addEventListener("click", () => {
      pinEntry = ""; pinError = ""; render();
    });

  } else {
    // Player selection screen
    app.innerHTML = `
      <div id="login-screen">
        <h1>WC2026 Fantasy Gambling</h1>
        <p>Who are you?</p>
        ${PLAYERS.map((p,i) => `
          <button class="login-btn" data-player="${p}" style="border-color:${PLAYER_COLORS[i]};color:${PLAYER_COLORS[i]};">${p}</button>
        `).join("")}
      </div>`;
    app.querySelectorAll(".login-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        pinEntry = btn.dataset.player;
        pinError = "";
        render();
      });
    });
  }
}

`;

    </div>
    <div class="stats-row-inner">
      <div class="stat-card-wide">

        <div style="display:flex;gap:18px;">
          <span class="stat-col">

            <div class="stat-col-value" style="color:#C86A00;">${drawGames}</div>
          </span>
        </div>
      </div>
      <div class="stat-card-wide">
        <div class="stat-label" style="margin-bottom:6px;">Record (Shares)</div>
        <div style="display:flex;gap:18px;">
          <span class="stat-col">
            <div class="stat-col-label" style="color:#3B6D11;">Won</div>
            <div class="stat-col-value" style="font-size:13px;color:#3B6D11;">+${wonShares.toLocaleString()}</div>
          </span>

  html += `<div class="tabs">

      <button class="tab-btn ${activeTab==="all"?"active":""}" data-tab="all">All Bets</button>
      <button class="tab-btn ${activeTab==="leaderboard"?"active":""}" data-tab="leaderboard">Leaderboard</button>
      ${currentPlayer === "R3" ? `<button class="tab-btn ${activeTab==="commissioner"?"active":""}" data-tab="commissioner" style="color:#993C1D;">Commissioner</button>` : ""}
    </div>`;

  // ── ODDS & BETS ──
  if (activeTab === "wager") {
    if (MATCHES.length === 0) {
      html += `<div style="text-align:center;color:#aaa;padding:3rem 0;font-size:14px;">
        Loading odds… check back in a moment.
      </div>`;
    } else {
      const ageStr = oddsLastUpdated
        ? "Odds updated " + new Date(oddsLastUpdated).toLocaleTimeString("en-US",{timeZone:"America/Chicago",hour:"numeric",minute:"2-digit",hour12:true}) + " CT"
        : "Odds loaded";
      html += `<div style="font-size:10px;color:#aaa;text-align:right;margin-bottom:8px;">${ageStr}</div>`;
    }
    html += `<div class="bet-type-row">`;
    BET_TYPES.forEach(bt => {
      html += `<button class="bt-pill ${betType===bt?"active":""}" data-bt="${bt}">${bt}</button>`;
    });
    html += `</div>`;

    let lastDateLabel = null;
    MATCHES.filter(m => !isLocked(m, now)).forEach(m => {
      const locked = isLocked(m, now);
      const opts   = getOdds(m, betType);
      const cd     = countdown(m, now);
      const isSel  = selected && selected.matchId === m.id;
      let lockHtml = "";
      if (locked) { lockHtml = `<div class="match-lock locked">Locked</div>`; }
      else if (cd) {
        const soon = cd.includes("m") && !cd.includes("h") && !cd.includes("d");
        lockHtml = `<div class="match-lock ${soon?"soon":"ok"}">Locks in ${cd}</div>`;
      }

      // Date divider — extract the date portion from ctLabel (everything before the ·)
      const dateLabel = m.ctLabel ? m.ctLabel.split(" · ")[0].trim() : "";
      if (dateLabel && dateLabel !== lastDateLabel) {
        html += `<div class="date-divider${lastDateLabel === null ? " first-divider" : ""}">${dateLabel}</div>`;
        lastDateLabel = dateLabel;
      }
      html += `
        <div class="match-row${locked?" locked":""}${isSel?" selected":""}" data-match="${m.id}">

          <div class="odds-pills">

              const isActive = isSel && selected.optionKey === opt.key;
              return `<button class="odds-pill${isActive?" active":""}${locked?" disabled":""}" data-match="${m.id}" data-opt="${opt.key}" ${locked?"disabled":""}>

                <div class="odds-pill-val ${opt.odds>0?"pos":"neg"}">${fmt(opt.odds)}</div>
              </button>`;
            }).join("")}
          </div>
        </div>`;

      // Pending bets for this match:
      // - If match is locked: show everyone's bets (game started, no spoilers possible)
      // - If match is NOT locked: only show the current player's own bets
      const matchPending = bets.filter(b => b.matchId === m.id && b.status === "pending");
      const visiblePending = locked
        ? matchPending
        : matchPending.filter(b => b.player === currentPlayer);
      if (visiblePending.length > 0) {
        html += `<div class="match-pending-bets">`;
        visiblePending.forEach(b => {

        });
        // If match is still open and others have bets, show a sealed count so you know action exists
        if (!locked) {
          const otherBetCount = matchPending.filter(b => b.player !== currentPlayer).length;

      } else if (!locked && matchPending.filter(b => b.player !== currentPlayer).length > 0) {

  }

  // ── MY BETS ──

  // ── ALL BETS — grouped by match, chronological, hide pre-kickoff bets from other players ──
  if (activeTab === "all") {
    let anyShown = false;

    [...MATCHES].reverse().forEach(m => {

      const visible = matchBets.filter(b => b.player === currentPlayer || locked);

        html += `<div class="comm-score-row">

        // Live preview of what the score would mean
        html += `<div class="comm-preview" id="preview-${m.id}"></div>`;
      }
      html += `</div>`;
    });
  }

  // ── LEADERBOARD ──
  if (activeTab === "leaderboard") {
    leaderboard.forEach((entry, rank) => {
      const playerBetsAll = bets.filter(b => b.player === entry.player);
      const wonBets  = playerBetsAll.filter(b => b.status === "won");
      const lostBets = playerBetsAll.filter(b => b.status === "lost");
      const pushBets = playerBetsAll.filter(b => b.status === "push");
      const pendBets = playerBetsAll.filter(b => b.status === "pending");
      const pendAmt     = pendBets.reduce((s,b) => s + b.wager, 0);
      const pendPotential = entry.balance + pendBets.reduce((s,b) => s + b.wager + b.toWin, 0);
      const record = `(${wonBets.length}-${lostBets.length}-${pushBets.length})`;

      html += `<div class="lb-row" style="border-left:4px solid ${PLAYER_COLORS[entry.idx]};display:flex;align-items:center;gap:10px;padding:12px 14px;">
        <div style="font-size:16px;font-weight:600;color:#ccc;min-width:28px;">#${rank+1}</div>

          <div style="font-weight:700;font-size:15px;">${entry.player}</div>
          <div style="font-size:12px;color:#888;margin-top:1px;">${record}</div>
        </div>
        ${pendBets.length > 0 ? `<div style="text-align:center;padding:0 12px;border-left:1px solid #eee;border-right:1px solid #eee;">
          <div style="font-size:10px;font-weight:600;color:#185FA5;margin-bottom:3px;">Pending Statistics</div>
          <div style="display:flex;gap:14px;">
            <span style="text-align:center;">
              <div style="font-size:10px;color:#185FA5;font-weight:600;text-decoration:underline;">Bets</div>

      </div>`;
    });

  }

  html += `</div>`;  // close whatever tab div — actually we didn't open one, so fine
  app.innerHTML = html;

  // ── Event listeners ──
  document.getElementById("logout-btn")?.addEventListener("click", () => {
    currentPlayer = null; selected = null; wagerVal = "";
    if(unsubBets) unsubBets(); if(unsubBalances) unsubBalances();
    render();
  });

  app.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      activeTab = btn.dataset.tab;
      selected = null; wagerVal = ""; wagerError = "";
      render();
    });
  });

  app.querySelectorAll(".bt-pill").forEach(btn => {
    btn.addEventListener("click", () => {
      betType = btn.dataset.bt; selected = null; wagerVal = ""; wagerError = "";
      render();
    });
  });

  app.querySelectorAll(".odds-pill:not(.disabled)").forEach(btn => {
    btn.addEventListener("click", () => {
      const matchId = btn.dataset.match, optKey = btn.dataset.opt;
      if (selected && selected.matchId===matchId && selected.optionKey===optKey) {
        selected = null; wagerVal = ""; wagerError = "";
      } else {
        selected = { matchId, optionKey: optKey };
        wagerVal = ""; wagerError = "";
      }
      render();
    });
  });

  const wi = document.getElementById("wager-input");
  if (wi) {
    wi.addEventListener("input", e => {
      wagerVal = e.target.value;
      wagerError = "";
      const amt = parseInt(wagerVal, 10) || 0;
      const calcsEl = document.getElementById("slip-calcs");
      const errEl   = document.getElementById("slip-error");
      if (errEl) errEl.textContent = "";
      if (calcsEl && selectedOpt) {
        if (amt > 0) {
          const tw = calcPayout(amt, selectedOpt.odds);
          calcsEl.style.display = "flex";
          calcsEl.innerHTML =
            "<span>Wager: <strong>" + amt.toLocaleString() + "</strong></span>" +
            "<span>To win: <strong class=\"green\">" + tw.toLocaleString() + "</strong></span>" +
            "<span>Return: <strong>" + (amt + tw).toLocaleString() + "</strong></span>";
        } else {
          calcsEl.style.display = "none";
        }
      }
    });
  }

  document.getElementById("place-btn")?.addEventListener("click", placeBet);

  document.getElementById("inject-bets-btn")?.addEventListener("click", forceInjectBets);

  // Edit score toggle
  app.querySelectorAll(".edit-score-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const formId = "edit-form-" + btn.dataset.match;
      const form = document.getElementById(formId);
      if (form) form.style.display = form.style.display === "none" ? "block" : "none";
    });
  });

  // Re-settle with corrected score
  MATCHES.forEach(m => {
    const btn = document.getElementById("re-settle-" + m.id);
    if (!btn) return;
    btn.addEventListener("click", () => {
      const hs = document.getElementById("ehs-" + m.id)?.value;
      const as2 = document.getElementById("eas-" + m.id)?.value;
      if (confirm("Reverse all payouts for " + m.home + " vs " + m.away + " and re-settle with " + m.home + " " + hs + "–" + as2 + " " + m.away + "?")) {
        reverseAndResettle(m.id, hs, as2);
      }
    });
  });

  app.querySelectorAll(".settle-btn:not(.delete-btn)").forEach(btn => {
    btn.addEventListener("click", () => settleBet(btn.dataset.id, btn.dataset.result));
  });

  app.querySelectorAll(".delete-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      if (confirm("Delete this bet and refund the shares?")) {
        deleteBet(btn.dataset.id);
      }
    });
  });

  // Commissioner: live preview as scores are typed
  MATCHES.forEach(m => {
    const hsEl = document.getElementById(`hs-${m.id}`);
    const asEl = document.getElementById(`as-${m.id}`);
    const previewEl = document.getElementById(`preview-${m.id}`);
    if (!hsEl || !asEl || !previewEl) return;

    function updatePreview() {
      const hs = parseInt(hsEl.value, 10), as2 = parseInt(asEl.value, 10);
      if (isNaN(hs) || isNaN(as2)) { previewEl.innerHTML = ""; return; }
      const totalGoals = hs + as2, diff = hs - as2;
      const matchBets = bets.filter(b => b.matchId === m.id && b.status === "pending");
      if (matchBets.length === 0) { previewEl.innerHTML = ""; return; }

      function resolveKey(optionKey, betType) {
        if (betType === "Moneyline") {
          if (optionKey === "home_win") return diff > 0  ? "won" : "lost";
          if (optionKey === "draw")     return diff === 0 ? "won" : "lost";
          if (optionKey === "away_win") return diff < 0  ? "won" : "lost";
        }
        if (betType === "Tie No Bet") {
          if (diff === 0) return "push";
          if (optionKey === "tnb_home") return diff > 0 ? "won" : "lost";
          if (optionKey === "tnb_away") return diff < 0 ? "won" : "lost";
        }
        if (betType === "Total Goals") {
          const line = m.total.line;
          if (totalGoals === line) return "push";
          if (optionKey === "over")  return totalGoals > line ? "won" : "lost";
          if (optionKey === "under") return totalGoals < line ? "won" : "lost";
        }
        if (betType === "Spread") {
          const line = m.spread.line, covered = diff - line;
          if (covered === 0) return "push";
          if (optionKey === "spread_home") return covered > 0 ? "won" : "lost";
          if (optionKey === "spread_away") return covered < 0 ? "won" : "lost";
        }
        if (betType === "Double Chance") {
          if (optionKey === "dc_1x") return diff >= 0 ? "won" : "lost";
          if (optionKey === "dc_x2") return diff <= 0 ? "won" : "lost";
          if (optionKey === "dc_12") return diff !== 0 ? "won" : "lost";
        }
        return "lost";
      }

      const lines = matchBets.map(b => {
        const r = resolveKey(b.optionKey, b.betType);
        const pi = PLAYERS.indexOf(b.player);
        const icon = r==="won" ? "✓" : r==="push" ? "~" : "✗";
        const clr  = r==="won" ? "#3B6D11" : r==="push" ? "#534AB7" : "#A32D2D";
        return `<span style="color:${clr};font-weight:500;">${icon} ${b.player}</span> ${b.betType} · ${b.optionLabel} · ${b.wager.toLocaleString()} → ${r==="won"?"+"+b.toWin.toLocaleString():r==="push"?"refund":"lost"}`;
      });
      previewEl.innerHTML = lines.join("<br>");
    }

    hsEl.addEventListener("input", updatePreview);
    asEl.addEventListener("input", updatePreview);

    document.getElementById(`settle-${m.id}`)?.addEventListener("click", () => {
      const hs = hsEl.value, as2 = asEl.value;
      if (hs === null || hs === "" || as2 === null || as2 === "") { toast("Enter both scores first.", "error"); return; }
      settleMatchByScore(m.id, hs, as2);
    });
  });
}

async function deleteBet(betId) {
  const bet = bets.find(b => b.id === betId);
  if (!bet) return;
  // Only allow deletion if match hasn't started yet
  const match = MATCHES.find(m => m.id === bet.matchId);
  if (match && isLocked(match, Date.now())) {
    toast("Can't delete — match has already started.", "error");
    return;
  }
  // Refund the wager
  const bal = balances[bet.player] ?? INITIAL_SHARES;
  await setDoc(doc(db, "balances", bet.player), { amount: bal + bet.wager });
  await deleteDoc(doc(db, "bets", betId));
  toast(`Bet deleted — ${bet.wager.toLocaleString()} shares refunded to ${bet.player}.`, "info");
}

// ── Settle all pending bets for a match given home/away score ──
async function settleMatchByScore(matchId, homeScore, awayScore) {
  const match = MATCHES.find(m => m.id === matchId);
  if (!match) return;
  const hs = parseInt(homeScore, 10);
  const as = parseInt(awayScore, 10);
  if (isNaN(hs) || isNaN(as)) return;

  const totalGoals = hs + as;
  const goalDiff   = hs - as; // positive = home win, 0 = draw, negative = away win
  const matchBets  = bets.filter(b => b.matchId === matchId && b.status === "pending");

  // Determine result for each bet key
  function resolveKey(optionKey, betType) {
    if (betType === "Moneyline") {
      if (optionKey === "home_win") return goalDiff > 0  ? "won" : "lost";
      if (optionKey === "draw")     return goalDiff === 0 ? "won" : "lost";
      if (optionKey === "away_win") return goalDiff < 0  ? "won" : "lost";
    }
    if (betType === "Tie No Bet") {
      if (goalDiff === 0) return "push"; // draw → refund
      if (optionKey === "tnb_home") return goalDiff > 0 ? "won" : "lost";
      if (optionKey === "tnb_away") return goalDiff < 0 ? "won" : "lost";
    }
    if (betType === "Total Goals") {
      const line = match.total.line;
      if (totalGoals === line) return "push";
      if (optionKey === "over")  return totalGoals > line ? "won" : "lost";
      if (optionKey === "under") return totalGoals < line ? "won" : "lost";
    }
    if (betType === "Spread") {
      const line = match.spread.line; // negative means home favored by that much
      const covered = goalDiff - line; // home covers if this > 0
      if (covered === 0) return "push";
      if (optionKey === "spread_home") return covered > 0 ? "won" : "lost";
      if (optionKey === "spread_away") return covered < 0 ? "won" : "lost";
    }
    if (betType === "Double Chance") {
      if (optionKey === "dc_1x") return (goalDiff >= 0) ? "won" : "lost"; // home or draw
      if (optionKey === "dc_x2") return (goalDiff <= 0) ? "won" : "lost"; // away or draw
      if (optionKey === "dc_12") return (goalDiff !== 0) ? "won" : "lost"; // home or away (no draw)
    }
    return "lost";
  }

  let settledCount = 0;
  for (const bet of matchBets) {
    const result = resolveKey(bet.optionKey, bet.betType);
    await updateDoc(doc(db, "bets", bet.id), { status: result });
    const bal = balances[bet.player] ?? INITIAL_SHARES;
    if (result === "won")  await setDoc(doc(db, "balances", bet.player), { amount: bal + bet.wager + bet.toWin });
    if (result === "push") await setDoc(doc(db, "balances", bet.player), { amount: bal + bet.wager });
    settledCount++;
  }

  // Store the final score in Firestore so it persists
  await setDoc(doc(db, "scores", matchId), { homeScore: hs, awayScore: as, settledAt: serverTimestamp() });

  toast(`${match.home} ${hs}–${as} ${match.away} · ${settledCount} bet${settledCount!==1?"s":""} settled`, "success");
}

// ── Reverse all settled bets for a match and re-settle with new score ──
async function reverseAndResettle(matchId, newHomeScore, newAwayScore) {
  const match = MATCHES.find(m => m.id === matchId);
  if (!match) return;
  const hs = parseInt(newHomeScore, 10);
  const as2 = parseInt(newAwayScore, 10);
  if (isNaN(hs) || isNaN(as2)) { toast("Enter valid scores.", "error"); return; }

  const matchBets = bets.filter(b => b.matchId === matchId && b.status !== "pending");

  // Step 1: Reverse existing payouts
  for (const bet of matchBets) {
    const bal = balances[bet.player] ?? INITIAL_SHARES;
    if (bet.status === "won") {
      await setDoc(doc(db, "balances", bet.player), { amount: bal - bet.wager - bet.toWin });
    } else if (bet.status === "push") {
      await setDoc(doc(db, "balances", bet.player), { amount: bal - bet.wager });
    }
    // lost bets: nothing was paid out so nothing to reverse
    await updateDoc(doc(db, "bets", bet.id), { status: "pending" });
  }

  // Small delay to let Firebase propagate balance changes
  await new Promise(r => setTimeout(r, 500));

  // Step 2: Re-settle with new score
  await settleMatchByScore(matchId, hs, as2);
}

// ── Commissioner: force-inject bets that were placed before the app was ready ──
// Writes directly to Firebase without touching balances (balances already reflect these bets)
async function forceInjectBets() {
  const toInject = [
    {
      player: "Brez",
      matchId: null, // resolved by name below
      matchLabel: "Korea Republic vs Czechia",
      ctLabel: "Thu Jun 11 · 9:00 PM CT",
      betType: "Total Goals",
      optionKey: "over",
      optionLabel: "O 2.5",
      odds: -115,
      wager: 1000,
      toWin: 870,
    },
    {
      player: "AK",
      matchId: null,
      matchLabel: "Mexico vs South Africa",
      ctLabel: "Thu Jun 11 · 2:00 PM CT",
      betType: "Moneyline",
      optionKey: "home_win",
      optionLabel: "Mexico",
      odds: -235,
      wager: 235,
      toWin: 100,
    },
    {
      player: "AK",
      matchId: null,
      matchLabel: "Korea Republic vs Czechia",
      ctLabel: "Thu Jun 11 · 9:00 PM CT",
      betType: "Moneyline",
      optionKey: "draw",
      optionLabel: "Draw",
      odds: 205,
      wager: 51,
      toWin: 105,
    },
    {
      player: "AK",
      matchId: null,
      matchLabel: "Korea Republic vs Czechia",
      ctLabel: "Thu Jun 11 · 9:00 PM CT",
      betType: "Total Goals",
      optionKey: "over",
      optionLabel: "O 2.5",
      odds: -115,
      wager: 100,
      toWin: 87,
    },
  ];

  // Find match IDs from loaded MATCHES — try name match, fall back to label
  function findMatchId(label) {
    // Try exact match first
    let m = MATCHES.find(m => (m.home + " vs " + m.away) === label);
    if (m) return m.id;
    // Try partial match on both team names
    const parts = label.split(" vs ");
    if (parts.length === 2) {
      m = MATCHES.find(m =>
        (m.home.includes(parts[0]) || parts[0].includes(m.home)) &&
        (m.away.includes(parts[1]) || parts[1].includes(m.away))
      );
    }
    if (m) return m.id;
    // Last resort — just use the label as the ID
    console.log("Could not find match ID for:", label, "MATCHES:", MATCHES.map(m=>m.home+"v"+m.away));
    return label;
  }

  let count = 0;
  for (const bet of toInject) {
    const resolvedId = findMatchId(bet.matchLabel);
    await addDoc(collection(db, "bets"), {
      player: bet.player,
      matchId: resolvedId,
      matchLabel: bet.matchLabel,
      ctLabel: bet.ctLabel,
      betType: bet.betType,
      optionKey: bet.optionKey,
      optionLabel: bet.optionLabel,
      odds: bet.odds,
      wager: bet.wager,
      toWin: bet.toWin,
      status: "pending",
      createdAt: serverTimestamp(),
    });
    count++;
  }
  toast("✓ " + count + " bets injected successfully", "success");
}

function renderBetCard(bet, canSettle) {
  const statusClass = `status-${bet.status}`;
  const statusLabel = {pending:"Pending",won:"Won ✓",lost:"Lost ✗",push:"Push ~"}[bet.status];
  const pi = PLAYERS.indexOf(bet.player);
  return `
    <div class="bet-card">
      <div class="bet-header">
        <div>
          <div class="bet-title" style="color:${PLAYER_COLORS[pi]}">${bet.player} · ${bet.matchLabel}</div>
          <div class="bet-sub">${bet.ctLabel} · ${bet.betType} → ${bet.optionLabel} (${fmt(bet.odds)})</div>
        </div>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>
      <div class="bet-amounts">
        <span>Wagered: <strong>${bet.wager.toLocaleString()}</strong></span>
        <span>To win: <strong style="color:#3B6D11">${bet.toWin.toLocaleString()}</strong></span>
      </div>
      ${bet.status==="pending" && canSettle ? `
        <div class="settle-row">
          <span class="settle-label">Settle:</span>
          <button class="settle-btn settle-won"  data-id="${bet.id}" data-result="won">Won</button>
          <button class="settle-btn settle-lost" data-id="${bet.id}" data-result="lost">Lost</button>
          <button class="settle-btn settle-push" data-id="${bet.id}" data-result="push">Push</button>
          ${currentPlayer === "R3" && !isLocked(MATCHES.find(m=>m.id===bet.matchId)||{kickoffUTC:0}, Date.now()) ? `<button class="settle-btn settle-delete delete-btn" data-id="${bet.id}">Delete & refund</button>` : ""}
        </div>` : ""}
    </div>`;
}
